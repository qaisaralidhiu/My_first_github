<script>
  // This function triggers when the user clicks your "Checkout" or "Place Order" button
  function triggerPayment(amount) {
    // Create the overlay background
    const overlay = document.createElement('div');
    overlay.id = 'payment-overlay';
    overlay.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; display:flex; align-items:center; justify-content:center; font-family: sans-serif;";
    
    // The Razorpay-style popup box
    overlay.innerHTML = `
      <div style="background:white; width:350px; border-radius:10px; overflow:hidden; animation: slideUp 0.3s ease-out;">
        <div style="background:#2B3445; color:white; padding:20px; text-align:center;">
          <h3 style="margin:0;">Zipp Checkout</h3>
          <p style="margin:5px 0 0; opacity:0.8;">Amount to Pay: ₹${amount}</p>
        </div>
        <div style="padding:20px;">
          <label style="display:block; font-size:12px; margin-bottom:5px; color:#666;">Phone Number</label>
          <input type="text" placeholder="9876543210" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px; margin-bottom:15px;">
          
          <div style="border:1px solid #eee; border-radius:8px; padding:10px; margin-bottom:15px; cursor:pointer; display:flex; align-items:center; gap:10px;">
            <span style="font-size:20px;">💳</span>
            <div><strong>Card</strong><br/><small style="color:#888;">Visa, MasterCard, RuPay</small></div>
          </div>
          
          <div style="border:1px solid #eee; border-radius:8px; padding:10px; margin-bottom:15px; cursor:pointer; display:flex; align-items:center; gap:10px;">
            <span style="font-size:20px;">📱</span>
            <div><strong>UPI</strong><br/><small style="color:#888;">Google Pay, PhonePe, Paytm</small></div>
          </div>

          <button id="pay-button" style="width:100%; background:#3399FF; color:white; border:none; padding:15px; border-radius:5px; font-weight:bold; cursor:pointer;">
            PAY ₹${amount}
          </button>
          <button onclick="document.getElementById('payment-overlay').remove()" style="width:100%; background:none; border:none; color:#888; margin-top:10px; cursor:pointer;">Cancel</button>
        </div>
      </div>
      <style>
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      </style>
    `;

    document.body.appendChild(overlay);

    // Handle the "Payment" click
    document.getElementById('pay-button').onclick = function() {
      this.innerHTML = "Processing...";
      this.style.opacity = "0.7";
      
      setTimeout(() => {
        overlay.innerHTML = `
          <div style="background:white; width:350px; border-radius:10px; padding:40px; text-align:center;">
            <div style="font-size:50px; color:#4BB543; margin-bottom:10px;">✅</div>
            <h2 style="margin:0;">Payment Successful</h2>
            <p style="color:#666;">Order ID: #ZIPP${Math.floor(Math.random()*10000)}</p>
            <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px; background:#000; color:#white; border-radius:5px; border:none; color:white; cursor:pointer;">Done</button>
          </div>
        `;
      }, 2000);
    };
  }
</script>
